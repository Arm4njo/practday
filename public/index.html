<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PractDay AI — Информационная система управления учебно-производственной практикой с элементами искусственного интеллекта">
  <title>PractDay AI — Управление практикой</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Sidebar Navigation -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <i class="fas fa-graduation-cap"></i>
        <span>PractDay <em>AI</em></span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Dynamic menu items inserted by JS -->
    </nav>

    <div class="sidebar-footer">
      <div class="lang-switch" id="langSwitch">
        <button class="lang-btn active" data-lang="ru">РУС</button>
        <button class="lang-btn" data-lang="kk">ҚАЗ</button>
      </div>
      <div class="user-info" id="userInfo" style="display:none;">
        <div class="user-avatar" id="userAvatar">А</div>
        <div class="user-details">
          <span class="user-name" id="userName"></span>
          <span class="user-role" id="userRole"></span>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Выйти"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </aside>

  <!-- Main content area -->
  <main class="main-content" id="mainContent">
    <header class="top-bar">
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fas fa-bars"></i>
      </button>
      <h1 class="page-title" id="pageTitle">Главная</h1>
      <div class="top-bar-actions">
        <div class="notifications-bell" id="notificationsBell">
          <i class="fas fa-bell"></i>
          <span class="badge" id="notifBadge" style="display:none;">0</span>
        </div>
      </div>
    </header>

    <div class="content-area" id="contentArea">
      <!-- Dynamic page content -->
      <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <p data-i18n="loading">Загрузка...</p>
      </div>
    </div>
  </main>

  <!-- Notifications panel -->
  <div class="notifications-panel" id="notificationsPanel" style="display:none;">
    <div class="notif-header">
      <h3 data-i18n="notifications">Уведомления</h3>
      <button id="readAllNotifs" data-i18n="read_all">Прочитать все</button>
    </div>
    <div class="notif-list" id="notifList"></div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal" id="modalContent">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/pages/login.js"></script>
  <script src="/js/pages/register.js"></script>
  <script src="/js/pages/guest.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/practices.js"></script>
  <script src="/js/pages/diary.js"></script>
  <script src="/js/pages/attendance.js"></script>
  <script src="/js/pages/reviews.js"></script>
  <script src="/js/pages/characteristics.js"></script>
  <script src="/js/pages/reports.js"></script>
  <script src="/js/pages/partner_students.js"></script>
  <script src="/js/pages/student_practice.js"></script>
  <script src="/js/pages/users.js"></script>
  <script src="/js/pages/chat.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
